spring:
  application:
    name: coupon-api

springdoc:
  # ControllerAdvice 由来の 400 を全操作へ自動付与しない。
  # エラー応答は各 @Operation / @ApiResponse で明示する（スタブは 501 のみ）。
  override-with-generic-response: false

coupon:
  # 逆引き該当判定の実装切替（型は一つ、実行は複数）。
  #   in-memory  : 既定。外部インフラゼロで動く（開発・テスト・MVP検証用）。
  #   opensearch : 本番規模の percolator 実装（要 OpenSearch 2.x — `docker compose up` で起動可）。
  percolator: in-memory
  # coupon.percolator=opensearch のときのみ使用される接続設定（既定では未使用）。
  opensearch:
    host: localhost
    port: 9200
    scheme: http
    index: distribution-rules
  # 配布条件（正準AST）の受領時検証の上限。暫定値（coupon-rule-schema / AST仕様 §4 で確定予定）。
  rule:
    max-depth: 8
    max-in-values: 100
  # イベント取り込みトランスポート。none=購読アダプタ無効（既定）。
  # sqs=EventBridge→SQS アダプタ（未実装スケルトン）。取り込みは /internal/events でも駆動可。
  events:
    transport: none
