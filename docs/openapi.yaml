openapi: 3.1.0
info:
  title: coupon-api
  description: クーポン基盤の実行時統合API。会員×クーポンの事前紐づけを持たず、会員属性を受け取って該当クーポンを判定・返却する。
  version: 0.1.0
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: coupons
  description: クーポンマスタ登録・該当判定（eligibility）・緊急停止一覧
- name: distribution-rules
  description: 配布ルール（逆引き該当判定の条件）の事前登録
- name: member-coupon-state
  description: 会員キーの状態＝coupon-api内の別モジュール・別データ所有
- name: stubs
  description: MVP対象外のAPI面（NCP-2892 API仕様には載るが本MVPでは未実装）。常に 501 を返す。
paths:
  /members/{memberId}/coupons/{couponId}/selection:
    put:
      tags:
      - member-coupon-state
      summary: クーポン選択更新
      description: 会員がクーポンを選択／選択解除する。
      operationId: updateSelection
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      - name: couponId
        in: path
        description: クーポンID
        required: true
        schema:
          type: string
        example: CP-2026-0001
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectionUpdateRequest"
        required: true
      responses:
        "204":
          description: 更新済み
  /members/{memberId}/coupons/{couponId}/favorite:
    put:
      tags:
      - member-coupon-state
      summary: クーポンお気に入り更新
      description: 会員がクーポンをお気に入り登録／解除する。
      operationId: updateFavorite
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      - name: couponId
        in: path
        description: クーポンID
        required: true
        schema:
          type: string
        example: CP-2026-0001
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteUpdateRequest"
        required: true
      responses:
        "204":
          description: 更新済み
  /members/coupons/transfer:
    put:
      tags:
      - member-coupon-state
      summary: 顧客別クーポン移行（ID統合）
      description: 旧IDから新IDへ会員キー状態を移す。MVP対象外・501。
      operationId: transfer
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/coupons/migrate:
    put:
      tags:
      - member-coupon-state
      summary: 顧客別クーポン統合（ID統合）
      description: 複数IDの会員キー状態を統合する。MVP対象外・501。
      operationId: migrate
      responses:
        "501":
          description: MVP対象外（未実装）
  /smooth/coupons/registrability:
    post:
      tags:
      - stubs
      summary: クーポン登録可否（Smooth）
      operationId: smoothRegistrability
      responses:
        "501":
          description: MVP対象外（未実装）
  /segments/distribution:
    post:
      tags:
      - stubs
      summary: セグメント配布API（SMC / DMP・新設）
      operationId: segmentDistribution
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons/welcome:
    post:
      tags:
      - member-coupon-state
      summary: ウェルカムクーポン登録
      description: 入会時の個別付与（INDIVIDUAL）。MVP対象外・501。
      operationId: welcome
      parameters:
      - name: memberId
        in: path
        required: true
        schema:
          type: string
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons/usage:
    post:
      tags:
      - member-coupon-state
      summary: クーポン利用更新（POS）
      description: 会計で利用されたクーポンを消費済みにする。以降、表示一覧の合成で差し引かれる。
      operationId: markUsage
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponUsageRequest"
        required: true
      responses:
        "204":
          description: 消費済みとして記録済み
  /members/{memberId}/coupons/event:
    post:
      tags:
      - member-coupon-state
      summary: イベント型クーポン登録
      description: イベント起点の個別付与（INDIVIDUAL）。MVP対象外・501。
      operationId: event
      parameters:
      - name: memberId
        in: path
        required: true
        schema:
          type: string
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupon-list:
    post:
      tags:
      - member-coupon-state
      summary: 会員のクーポン表示一覧（該当判定 − 消費済み − 停止中）
      description: EligibilityService の生の結果から、会員の消費済みクーポンと緊急停止中（SUSPENDED）を差し引いて返す合成エンドポイント。属性は
        BFF がプロファイルストアから取得して渡す（本サービスは保持しない）。
      operationId: couponList
      parameters:
      - name: memberId
        in: path
        description: 会員ID（不透明な識別子）
        required: true
        schema:
          type: string
        example: M-000123
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCouponListRequest"
        required: true
      responses:
        "200":
          description: 表示対象クーポン（ID＋distributionType）の一覧
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MemberCouponListResponse"
  /distribution-rules:
    post:
      tags:
      - distribution-rules
      summary: 配布ルールの事前登録
      description: 条件は簡易形（rules 配列＝eq の OR）またはリッチ形（and/or＋eq/gte/lte/gt/lt/in）。登録時に
        AST へ正規化され、不正なら 400。
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDistributionRuleRequest"
        required: true
      responses:
        "201":
          description: 登録済み
        "400":
          description: 条件の正規化・検証エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /coupons:
    post:
      tags:
      - coupons
      summary: クーポンマスタ登録（upsert）
      description: eligibility 判定のためのシードパス。同一 couponId は上書き。
      operationId: register_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCouponRequest"
        required: true
      responses:
        "201":
          description: 登録済み
        "400":
          description: 入力検証・ドメイン検証エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /coupons/eligibility:
    post:
      tags:
      - coupons
      summary: クーポン一覧取得（属性に基づく該当判定＋全員配信の付与。差し引きなしの生集合）
      description: "percolate 該当の SEGMENT（有効期間内）∪ 有効期間内の ALL の生集合を返す。消費済み・選択状態・SUSPENDED\
        \ の差し引きは行わない（会員向け表示一覧の合成は POST /members/{memberId}/coupon-list、BFF 経路の差し引き\
        は BFF の責務）。"
      operationId: eligibility
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibilityRequest"
        required: true
      responses:
        "200":
          description: 該当クーポン（ID＋distributionType）の一覧
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "400":
          description: 属性・判定基準時刻の検証エラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stores/coupons:
    get:
      tags:
      - stubs
      summary: 店舗用クーポン詳細情報取得（PIT）
      operationId: storeCoupons
      responses:
        "501":
          description: MVP対象外（未実装）
  /smc/coupons:
    get:
      tags:
      - stubs
      summary: クーポン情報取得（SMC）
      operationId: smcCoupons
      responses:
        "501":
          description: MVP対象外（未実装）
  /products/coupon-ids:
    get:
      tags:
      - stubs
      summary: 商品紐づきクーポンID一覧取得（在庫）
      operationId: productCouponIds
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons/selected:
    get:
      tags:
      - member-coupon-state
      summary: 顧客選択クーポン取得（POS）
      description: 会員が選択中のクーポンID一覧。POS が会計時に照会する。
      operationId: selectedCoupons
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      responses:
        "200":
          description: 選択中のクーポンID一覧
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SelectedCouponsResponse"
  /coupons/suspended:
    get:
      tags:
      - coupons
      summary: 緊急停止中クーポンID一覧
      description: BFF が表示直前に eligibility 結果から差し引く（キャッシュ TTL に依らず即時反映）。
      operationId: suspended
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SuspendedCouponsResponse"
  /coupons/details:
    get:
      tags:
      - stubs
      summary: クーポン詳細情報取得 / 全件取得
      operationId: couponDetails
      responses:
        "501":
          description: MVP対象外（未実装）
  /cms/coupons/existence:
    get:
      tags:
      - stubs
      summary: クーポン存在確認（CMS）
      operationId: cmsExistence
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons:
    delete:
      tags:
      - member-coupon-state
      summary: 顧客別クーポン削除（退会）
      description: 退会に伴い会員キー状態を削除する。MVP対象外・501。
      operationId: withdraw
      parameters:
      - name: memberId
        in: path
        required: true
        schema:
          type: string
      responses:
        "501":
          description: MVP対象外（未実装）
components:
  schemas:
    SelectionUpdateRequest:
      type: object
      description: クーポン選択更新リクエスト
      properties:
        selected:
          type: boolean
          description: true=選択 / false=選択解除
          example: true
      required:
      - selected
    FavoriteUpdateRequest:
      type: object
      description: クーポンお気に入り更新リクエスト
      properties:
        favorite:
          type: boolean
          description: true=お気に入り登録 / false=解除
          example: true
      required:
      - favorite
    CouponUsageRequest:
      type: object
      description: クーポン利用更新（POS）リクエスト。会計で利用されたクーポンを消費済みにする。
      properties:
        couponIds:
          type: array
          items:
            description: 消費済みにするクーポンID
          minItems: 1
      required:
      - couponIds
    MemberCouponListRequest:
      type: object
      description: 会員のクーポン表示一覧リクエスト。属性は BFF がプロファイルストア（外部）から取得して渡す — 本サービスは属性を保持しない。
      properties:
        attributes:
          type: object
          additionalProperties: {}
          description: 1会員分の属性。BFF がプロファイルストアから取得して渡す（本サービスは保持しない）。
          example:
            age: 25
            gender: female
            store: "1024"
        at:
          type: string
          format: date-time
          description: 判定基準時刻。省略時はサーバの現在時刻。
          example: 2026-07-07T09:00:00Z
      required:
      - attributes
    DisplayCouponResponse:
      type: object
      description: 表示対象クーポン（該当判定の結果から消費済み・停止中を差し引いた後）
      properties:
        couponId:
          type: string
          description: クーポンID
          example: CP-2026-0001
        distributionType:
          type: string
          description: 配布種別（ALL または SEGMENT）
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
      required:
      - couponId
      - distributionType
    MemberCouponListResponse:
      type: object
      description: 会員のクーポン表示一覧レスポンス（該当判定 − 消費済み − 停止中）
      properties:
        coupons:
          type: array
          items:
            $ref: "#/components/schemas/DisplayCouponResponse"
      required:
      - coupons
    RegisterDistributionRuleRequest:
      type: object
      description: 配布ルール事前登録リクエスト
      properties:
        couponId:
          type: string
          description: 対象クーポンID
          example: CP-2026-0001
          minLength: 1
        condition:
          description: "配布条件。簡易形 {\"rules\":[{\"key\",\"value\"}...]}（eq の OR）またはリ\
            ッチ形 {\"and\"/\"or\":[...]}＋eq/gte/lte/gt/lt/in。"
          example:
            and:
            - key: age
              op: gte
              value: 20
            - key: age
              op: lte
              value: 39
        validFrom:
          type: string
          format: date-time
          description: ルール有効期間の開始（含む）
          example: 2026-07-01T00:00:00Z
        validTo:
          type: string
          format: date-time
          description: ルール有効期間の終了（含む）
          example: 2026-07-31T23:59:59Z
      required:
      - condition
      - couponId
      - validFrom
      - validTo
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    RegisterCouponRequest:
      type: object
      description: クーポンマスタ登録（upsert）リクエスト
      properties:
        couponId:
          type: string
          description: クーポンID
          example: CP-2026-0001
          minLength: 1
        distributionType:
          type: string
          description: 配布種別。ALL=全員配信 / SEGMENT=属性該当 / INDIVIDUAL=個別付与（属性では決まらない）
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
        validFrom:
          type: string
          format: date-time
          description: 有効期間の開始（含む）
          example: 2026-07-01T00:00:00Z
        validTo:
          type: string
          format: date-time
          description: 有効期間の終了（含む）
          example: 2026-07-31T23:59:59Z
        status:
          type: string
          default: ACTIVE
          description: 状態。SUSPENDED は緊急停止中（/coupons/suspended に載る）
          enum:
          - ACTIVE
          - SUSPENDED
      required:
      - couponId
      - distributionType
      - validFrom
      - validTo
    EligibilityRequest:
      type: object
      description: 該当判定（eligibility）リクエスト
      properties:
        attributes:
          type: object
          additionalProperties: {}
          description: 1会員分の属性。BFF がプロファイルストアから取得して渡す（本サービスは保持しない）。
          example:
            age: 25
            gender: female
            store: "1024"
        at:
          type: string
          format: date-time
          description: 判定基準時刻。省略時はサーバの現在時刻。
          example: 2026-07-07T09:00:00Z
      required:
      - attributes
    EligibilityResponse:
      type: object
      description: 該当判定（eligibility）レスポンス
      properties:
        coupons:
          type: array
          items:
            $ref: "#/components/schemas/EligibleCouponResponse"
      required:
      - coupons
    EligibleCouponResponse:
      type: object
      description: 該当クーポン（IDと配布種別のみ。詳細・画像・並び順の整形は BFF/CMS 側）
      properties:
        couponId:
          type: string
          description: クーポンID
          example: CP-2026-0001
        distributionType:
          type: string
          description: 配布種別（ALL または SEGMENT。INDIVIDUAL は eligibility の対象外）
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
      required:
      - couponId
      - distributionType
    SelectedCouponsResponse:
      type: object
      description: 会員が選択中のクーポンID一覧（POS 会計時の照会用）
      properties:
        couponIds:
          type: array
          description: 選択中のクーポンID
          example:
          - CP-2026-0001
          items:
            type: string
      required:
      - couponIds
    SuspendedCouponsResponse:
      type: object
      description: 緊急停止中クーポンID一覧。BFF が表示直前に差し引く。
      properties:
        couponIds:
          type: array
          description: SUSPENDED 状態のクーポンID
          example:
          - CP-2026-0009
          items:
            type: string
      required:
      - couponIds
