openapi: 3.1.0
info:
  title: coupon-api
  description: クーポン基盤の実行時統合API。会員×クーポンの事前紐づけを持たず、会員属性を受け取って該当クーポンを判定・返却する。
  version: 0.1.0
servers:
- url: http://localhost:8081
  description: Generated server url
tags:
- name: coupons
  description: クーポンマスタ登録・該当判定（eligibility）・緊急停止一覧
- name: internal-events
  description: イベント駆動プロジェクションの取り込み口（coupon-admin → EventBridge → 本API）。外部ルール登録APIではない。
- name: member-coupon-state
  description: 会員キーの状態＝coupon-api内の別モジュール・別データ所有
- name: stubs
  description: MVP対象外のAPI面（NCP-2892 API仕様には載るが本MVPでは未実装）。常に 501 を返す。
paths:
  /members/{memberId}/coupons/{couponId}/selection:
    put:
      tags:
      - member-coupon-state
      summary: クーポン選択更新
      description: 会員がクーポンを選択／選択解除する。
      operationId: updateSelection
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      - name: couponId
        in: path
        description: クーポンID
        required: true
        schema:
          type: string
        example: CP-2026-0001
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectionUpdateRequest"
        required: true
      responses:
        "204":
          description: 更新済み
  /members/{memberId}/coupons/{couponId}/favorite:
    put:
      tags:
      - member-coupon-state
      summary: クーポンお気に入り更新
      description: 会員がクーポンをお気に入り登録／解除する。
      operationId: updateFavorite
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      - name: couponId
        in: path
        description: クーポンID
        required: true
        schema:
          type: string
        example: CP-2026-0001
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteUpdateRequest"
        required: true
      responses:
        "204":
          description: 更新済み
  /members/coupons/transfer:
    put:
      tags:
      - member-coupon-state
      summary: 顧客別クーポン移行（ID統合）
      description: 旧ID（fromMemberId）の会員キー状態をすべて新ID（toMemberId）へ移す。同一 couponId が衝突したら各フラグ（used/granted/selected/favorite）の
        OR でマージし、移行後に旧IDの状態を空にする。
      operationId: transfer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdIntegrationRequest"
        required: true
      responses:
        "200":
          description: 移行済み
        "400":
          description: 入力検証エラー（同一ID・空IDなど）
  /members/coupons/migrate:
    put:
      tags:
      - member-coupon-state
      summary: 顧客別クーポン統合（ID統合）
      description: fromMemberId の会員キー状態を toMemberId へ統合（和集合）する。同一 couponId の衝突は各フラグの
        OR でマージし、統合後に fromMemberId の状態を空にする。レガシーの会員種別パターン分岐は MVP 対象外（transfer と同じマージ規則へ正規化）。
      operationId: migrate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdIntegrationRequest"
        required: true
      responses:
        "200":
          description: 統合済み
        "400":
          description: 入力検証エラー（同一ID・空IDなど）
  /smooth/coupons/registrability:
    post:
      tags:
      - stubs
      summary: クーポン登録可否（Smooth）
      operationId: smoothRegistrability
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons/welcome:
    post:
      tags:
      - member-coupon-state
      summary: ウェルカムクーポン登録（INDIVIDUAL の個別付与）
      description: "入会を契機に INDIVIDUAL クーポンを会員へ付与する。クーポンマスタに存在しない、または INDIVIDUAL 以外\
        の couponId は 400。付与済み INDIVIDUAL は表示一覧の合成（POST /members/{memberId}/coupon-list）\
        にのみ現れ、POST /coupons/eligibility の生集合には現れない。"
      operationId: welcome
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantCouponRequest"
        required: true
      responses:
        "201":
          description: 付与済み
        "400":
          description: クーポンが存在しない／INDIVIDUAL でない／入力検証エラー
  /members/{memberId}/coupons/usage:
    post:
      tags:
      - member-coupon-state
      summary: クーポン利用更新（POS）
      description: 会計で利用されたクーポンを消費済みにする。以降、表示一覧の合成で差し引かれる。
      operationId: markUsage
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponUsageRequest"
        required: true
      responses:
        "204":
          description: 消費済みとして記録済み
  /members/{memberId}/coupons/event:
    post:
      tags:
      - member-coupon-state
      summary: イベント型クーポン登録（INDIVIDUAL の個別付与）
      description: イベントを契機に INDIVIDUAL クーポンを会員へ付与する。付与の意味・検証はウェルカムと同一（契機が違うだけ）。クーポンマスタに存在しない、または
        INDIVIDUAL 以外の couponId は 400。
      operationId: event
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantCouponRequest"
        required: true
      responses:
        "201":
          description: 付与済み
        "400":
          description: クーポンが存在しない／INDIVIDUAL でない／入力検証エラー
  /members/{memberId}/coupon-list:
    post:
      tags:
      - member-coupon-state
      summary: 会員のクーポン表示一覧（該当判定 − 消費済み − 停止中）
      description: EligibilityService の生の結果から、会員の消費済みクーポンと緊急停止中（SUSPENDED）を差し引いて返す合成エンドポイント。属性は
        BFF がプロファイルストアから取得して渡す（本サービスは保持しない）。
      operationId: couponList
      parameters:
      - name: memberId
        in: path
        description: 会員ID（不透明な識別子）
        required: true
        schema:
          type: string
        example: M-000123
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCouponListRequest"
        required: true
      responses:
        "200":
          description: 表示対象クーポン（ID＋distributionType）の一覧
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MemberCouponListResponse"
  /internal/events:
    post:
      tags:
      - internal-events
      summary: ドメインイベント受領（冪等取り込み）
      description: coupon-admin の fat event を受領し、percolator＋クーポンマスタ投影を更新する。eventId
        重複排除＋version の last-writer-wins。不正イベントは適用せず 422（DLQ 相当）。
      operationId: receive
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponEventEnvelopeRequest"
        required: true
      responses:
        "202":
          description: 受領（APPLIED / DUPLICATE / STALE）
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EventIngestResponse"
        "422":
          description: 不正イベント（適用せず DLQ）
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /internal/events/resync:
    post:
      tags:
      - internal-events
      summary: 全件resync（スナップショット再適用）
      description: coupon-admin から再発行された現在状態のスナップショットで read model を作り直す。トリガー・頻度（手動/定期/イベント起動）は未確定（変更ブリーフ
        §4）。
      operationId: resync
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResyncRequest"
        required: true
      responses:
        "200":
          description: 再構築完了
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EventIngestResponse"
  /coupons:
    post:
      tags:
      - coupons
      summary: クーポンマスタ登録（upsert）
      description: eligibility 判定のためのシードパス。同一 couponId は上書き。
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCouponRequest"
        required: true
      responses:
        "201":
          description: 登録済み
        "400":
          description: 入力検証・ドメイン検証エラー
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /coupons/eligibility:
    post:
      tags:
      - coupons
      summary: クーポン一覧取得（属性に基づく該当判定＋全員配信の付与。差し引きなしの生集合）
      description: "percolate 該当の SEGMENT（有効期間内）∪ 有効期間内の ALL の生集合を返す。消費済み・選択状態・SUSPENDED\
        \ の差し引きは行わない（会員向け表示一覧の合成は POST /members/{memberId}/coupon-list、BFF 経路の差し引き\
        は BFF の責務）。"
      operationId: eligibility
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibilityRequest"
        required: true
      responses:
        "200":
          description: 該当クーポン（ID＋distributionType）の一覧
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "400":
          description: 属性・判定基準時刻の検証エラー
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
  /stores/coupons:
    get:
      tags:
      - stubs
      summary: 店舗用クーポン詳細情報取得（PIT）
      operationId: storeCoupons
      responses:
        "501":
          description: MVP対象外（未実装）
  /smc/coupons:
    get:
      tags:
      - stubs
      summary: クーポン情報取得（SMC）
      operationId: smcCoupons
      responses:
        "501":
          description: MVP対象外（未実装）
  /products/coupon-ids:
    get:
      tags:
      - stubs
      summary: 商品紐づきクーポンID一覧取得（在庫）
      operationId: productCouponIds
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons/selected:
    get:
      tags:
      - member-coupon-state
      summary: 顧客選択クーポン取得（POS）
      description: 会員が選択中のクーポンID一覧。POS が会計時に照会する。
      operationId: selectedCoupons
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      responses:
        "200":
          description: 選択中のクーポンID一覧
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SelectedCouponsResponse"
  /coupons/suspended:
    get:
      tags:
      - coupons
      summary: 緊急停止中クーポンID一覧
      description: BFF が表示直前に eligibility 結果から差し引く（キャッシュ TTL に依らず即時反映）。
      operationId: suspended
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SuspendedCouponsResponse"
  /coupons/details:
    get:
      tags:
      - stubs
      summary: クーポン詳細情報取得 / 全件取得
      operationId: couponDetails
      responses:
        "501":
          description: MVP対象外（未実装）
  /cms/coupons/existence:
    get:
      tags:
      - stubs
      summary: クーポン存在確認（CMS）
      operationId: cmsExistence
      responses:
        "501":
          description: MVP対象外（未実装）
  /members/{memberId}/coupons:
    delete:
      tags:
      - member-coupon-state
      summary: 顧客別クーポン削除（退会）
      description: 退会に伴い会員キー状態（選択・お気に入り・消費済み・付与済み）をすべて削除する。冪等。
      operationId: withdraw
      parameters:
      - name: memberId
        in: path
        description: 会員ID
        required: true
        schema:
          type: string
        example: M-000123
      responses:
        "204":
          description: 削除済み
components:
  schemas:
    SelectionUpdateRequest:
      type: object
      description: クーポン選択更新リクエスト
      properties:
        selected:
          type: boolean
          description: true=選択 / false=選択解除
          example: true
      required:
      - selected
    FavoriteUpdateRequest:
      type: object
      description: クーポンお気に入り更新リクエスト
      properties:
        favorite:
          type: boolean
          description: true=お気に入り登録 / false=解除
          example: true
      required:
      - favorite
    IdIntegrationRequest:
      type: object
      description: ID統合リクエスト（移行 transfer / 統合 migrate 共通）。from の会員キー状態を to へ移す。
      properties:
        fromMemberId:
          type: string
          description: 移行元の会員ID
          example: M-000123
          minLength: 1
        toMemberId:
          type: string
          description: 移行先の会員ID
          example: M-000456
          minLength: 1
      required:
      - fromMemberId
      - toMemberId
    GrantCouponRequest:
      type: object
      description: 個別クーポン付与リクエスト（ウェルカム/イベント登録）。対象は INDIVIDUAL クーポンのみ。
      properties:
        couponId:
          type: string
          description: 付与するクーポンID（クーポンマスタに登録済みの INDIVIDUAL）
          example: IND-2026-0001
          minLength: 1
      required:
      - couponId
    CouponUsageRequest:
      type: object
      description: クーポン利用更新（POS）リクエスト。会計で利用されたクーポンを消費済みにする。
      properties:
        couponIds:
          type: array
          items:
            description: 消費済みにするクーポンID
          minItems: 1
      required:
      - couponIds
    MemberCouponListRequest:
      type: object
      description: 会員のクーポン表示一覧リクエスト。属性は BFF がプロファイルストア（外部）から取得して渡す — 本サービスは属性を保持しない。
      properties:
        attributes:
          type: object
          additionalProperties: {}
          description: 1会員分の属性。BFF がプロファイルストアから取得して渡す（本サービスは保持しない）。
          example:
            age: 25
            gender: female
            store: "1024"
        at:
          type: string
          format: date-time
          description: 判定基準時刻。省略時はサーバの現在時刻。
          example: 2026-07-07T09:00:00Z
      required:
      - attributes
    DisplayCouponResponse:
      type: object
      description: 表示対象クーポン（該当判定の結果から消費済み・停止中を差し引いた後）
      properties:
        couponId:
          type: string
          description: クーポンID
          example: CP-2026-0001
        distributionType:
          type: string
          description: 配布種別（ALL または SEGMENT）
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
      required:
      - couponId
      - distributionType
    MemberCouponListResponse:
      type: object
      description: 会員のクーポン表示一覧レスポンス（該当判定 − 消費済み − 停止中）
      properties:
        coupons:
          type: array
          items:
            $ref: "#/components/schemas/DisplayCouponResponse"
      required:
      - coupons
    CouponEventDataRequest:
      type: object
      description: イベントペイロード。CouponDeleted は couponId のみ、それ以外は投影に必要な全項目。
      properties:
        couponId:
          type: string
          minLength: 1
        schemaVersion:
          type: string
          description: 条件スキーマ版（coupon-rule-schema）
          example: 1.0
        condition:
          description: 配布条件（正準AST・coupon-rule-schema 準拠）。SEGMENT のとき必須相当。
        distributionType:
          type: string
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
        effectiveFrom:
          type: string
          format: date-time
          description: 有効期間の開始（含む・RFC 3339）
          example: 2026-07-01T00:00:00+09:00
        effectiveTo:
          type: string
          format: date-time
          description: 有効期間の終了（含む・RFC 3339）
          example: 2026-07-31T23:59:59+09:00
        status:
          type: string
          enum:
          - ACTIVE
          - SUSPENDED
      required:
      - couponId
    CouponEventEnvelopeRequest:
      type: object
      description: coupon-admin ドメインイベント（fat event / CloudEvents 風）
      properties:
        eventId:
          type: string
          description: イベントID（冪等の重複排除キー）
          example: evt-01H...
          minLength: 1
        type:
          type: string
          description: イベント型
          example: CouponApproved
          minLength: 1
        version:
          type: integer
          format: int64
          description: クーポンの版（last-writer-wins）
          example: 7
        occurredAt:
          type: string
          format: date-time
          description: 発生時刻（RFC 3339）
          example: 2026-07-09T09:00:00Z
        traceId:
          type: string
          description: W3C Trace Context の相関ID
          example: 0af7651916cd43dd8448eb211c80319c
        data:
          $ref: "#/components/schemas/CouponEventDataRequest"
      required:
      - data
      - eventId
      - occurredAt
      - type
      - version
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties: {}
    EventIngestResponse:
      type: object
      description: 取り込み結果（APPLIED / DUPLICATE / STALE / RESYNCED）
      properties:
        outcome:
          type: string
      required:
      - outcome
    ResyncRequest:
      type: object
      description: 全件resync リクエスト（現在状態を表すイベントのスナップショット）
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/CouponEventEnvelopeRequest"
      required:
      - events
    RegisterCouponRequest:
      type: object
      description: クーポンマスタ登録（upsert）リクエスト
      properties:
        couponId:
          type: string
          description: クーポンID
          example: CP-2026-0001
          minLength: 1
        distributionType:
          type: string
          description: 配布種別。ALL=全員配信 / SEGMENT=属性該当 / INDIVIDUAL=個別付与（属性では決まらない）
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
        validFrom:
          type: string
          format: date-time
          description: 有効期間の開始（含む）
          example: 2026-07-01T00:00:00Z
        validTo:
          type: string
          format: date-time
          description: 有効期間の終了（含む）
          example: 2026-07-31T23:59:59Z
        status:
          type: string
          default: ACTIVE
          description: 状態。SUSPENDED は緊急停止中（/coupons/suspended に載る）
          enum:
          - ACTIVE
          - SUSPENDED
      required:
      - couponId
      - distributionType
      - validFrom
      - validTo
    EligibilityRequest:
      type: object
      description: 該当判定（eligibility）リクエスト
      properties:
        attributes:
          type: object
          additionalProperties: {}
          description: 1会員分の属性。BFF がプロファイルストアから取得して渡す（本サービスは保持しない）。
          example:
            age: 25
            gender: female
            store: "1024"
        at:
          type: string
          format: date-time
          description: 判定基準時刻。省略時はサーバの現在時刻。
          example: 2026-07-07T09:00:00Z
      required:
      - attributes
    EligibilityResponse:
      type: object
      description: 該当判定（eligibility）レスポンス
      properties:
        coupons:
          type: array
          items:
            $ref: "#/components/schemas/EligibleCouponResponse"
      required:
      - coupons
    EligibleCouponResponse:
      type: object
      description: 該当クーポン（IDと配布種別のみ。詳細・画像・並び順の整形は BFF/CMS 側）
      properties:
        couponId:
          type: string
          description: クーポンID
          example: CP-2026-0001
        distributionType:
          type: string
          description: 配布種別（ALL または SEGMENT。INDIVIDUAL は eligibility の対象外）
          enum:
          - ALL
          - SEGMENT
          - INDIVIDUAL
      required:
      - couponId
      - distributionType
    SelectedCouponsResponse:
      type: object
      description: 会員が選択中のクーポンID一覧（POS 会計時の照会用）
      properties:
        couponIds:
          type: array
          description: 選択中のクーポンID
          example:
          - CP-2026-0001
          items:
            type: string
      required:
      - couponIds
    SuspendedCouponsResponse:
      type: object
      description: 緊急停止中クーポンID一覧。BFF が表示直前に差し引く。
      properties:
        couponIds:
          type: array
          description: SUSPENDED 状態のクーポンID
          example:
          - CP-2026-0009
          items:
            type: string
      required:
      - couponIds
